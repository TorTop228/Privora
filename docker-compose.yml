version: "3.9"

services:
  consumer-agent-bot:
    build: .
    container_name: consumer_agent_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_MODEL=${GITHUB_MODEL:-openai/gpt-4o}
      - USE_DEVNET=${USE_DEVNET:-true}
      - DEMO_MERCHANT_ADDRESS=${DEMO_MERCHANT_ADDRESS:-}
      - MAGICBLOCK_VALIDATOR=${MAGICBLOCK_VALIDATOR:-}
      - MAGICBLOCK_AUTHORIZATION=${MAGICBLOCK_AUTHORIZATION:-}
      - WALLETS_DIR=/app/data/wallets
      - STORAGE_DIR=/app/data/history
    volumes:
      # Bind mount — data lives on the HOST at ./data/
      # Survives: docker-compose up --build, restarts, image rebuilds
      # Only deleted if you manually run: rm -rf ./data
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
